name: Multi_Site_IP_Update

on:
  schedule:
    # 按照你要求的多时间段触发 (北京时间 05:30, 06:00, 06:30, 07:00)
    - cron: '30 21 * * *'
    - cron: '0 22 * * *'
    - cron: '30 22 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch: # 允许手动运行

permissions:
  contents: write

jobs:
  run_scrapers:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. 缓存浏览器
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: 4. 安装依赖
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: 5. 依次运行脚本并合并结果
        run: |
          # 1. 创建并清空临时文件
          # 注意：这里改用 touch 确保文件干净，不带多余空行
          touch temp_ips.txt
          
          echo "正在运行 uouin.js..."
          node scrapers/uouin.js >> temp_ips.txt || echo "uouin 运行失败"
          
          echo "正在运行 v2too.js..."
          node scrapers/v2too.js >> temp_ips.txt || echo "v2too 运行失败"
          
          # 2. 关键修改：去重但不改变顺序
          # grep -v '^$' 去掉空行
          # awk '!x[$0]++' 这是一个经典的去重命令，它只保留第一次出现的行，不打乱顺序
          grep -v '^$' temp_ips.txt | awk '!x[$0]++' > ips.txt
          
          echo "合并完成，顺序已固定。预览结果："
          cat ips.txt

      - name: 6. 将结果推送到仓库
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          export TZ='Asia/Shanghai'
          CUR_TIME=$(date +'%Y-%m-%d %H:%M:%S')
          
          # 只添加 ips.txt，不理会其他缓存文件
          git add ips.txt
          
          # 检查 ips.txt 是否真的有变化
          if git diff --staged --quiet; then
            echo "IP 数据未变动，无需更新。"
          else
            git commit -m "自动更新聚合IP: $CUR_TIME"
            git push
          fi
